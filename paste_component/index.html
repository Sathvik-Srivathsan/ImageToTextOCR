<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://unpkg.com/streamlit-component-lib/dist/index.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    #paste-zone {
      width: 100%;
      min-height: 80px;
      border: 2px dashed #3d4450;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      padding: 16px;
      color: #8b949e;
      font-size: 14px;
      text-align: center;
      user-select: none;
    }
    #paste-zone:hover, #paste-zone.drag-over {
      border-color: #7C9BF5;
      background: rgba(124, 155, 245, 0.06);
      color: #E6EDF3;
    }
    #paste-zone.has-image {
      border-color: #3fb950;
      border-style: solid;
      color: #3fb950;
    }
    #paste-zone .icon {
      font-size: 28px;
      line-height: 1;
      opacity: 0.7;
    }
    #paste-zone .label { font-weight: 500; }
    #paste-zone .sublabel { font-size: 12px; opacity: 0.6; }
    #preview-container {
      display: none;
      width: 100%;
      text-align: center;
    }
    #preview-container img {
      max-width: 100%;
      max-height: 300px;
      border-radius: 6px;
      border: 1px solid #30363d;
    }
    #preview-container .filename {
      font-size: 12px;
      color: #8b949e;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div>
    <div id="paste-zone" tabindex="0">
      <div class="icon">&#128203;</div>
      <div class="label">Paste an image here</div>
      <div class="sublabel">Ctrl+V / Cmd+V &middot; or drag &amp; drop</div>
    </div>
    <div id="preview-container">
      <img id="preview-img" />
      <div class="filename" id="filename-label"></div>
    </div>
  </div>

  <script>
    const pasteZone = document.getElementById('paste-zone');
    const previewContainer = document.getElementById('preview-container');
    const previewImg = document.getElementById('preview-img');
    const filenameLabel = document.getElementById('filename-label');

    let currentValue = "";

    function processFile(file) {
      if (!file || !file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const dataUrl = e.target.result;
        currentValue = dataUrl;
        previewImg.src = dataUrl;
        filenameLabel.textContent = file.name || 'clipboard-image.png';
        previewContainer.style.display = 'block';
        pasteZone.style.display = 'none';
        Streamlit.setComponentValue(currentValue);
      };
      reader.readAsDataURL(file);
    }

    // Ctrl+V / Cmd+V paste
    document.addEventListener('paste', function(e) {
      e.preventDefault();
      const items = e.clipboardData && e.clipboardData.items;
      if (!items) return;
      for (let i = 0; i < items.length; i++) {
        if (items[i].type.startsWith('image/')) {
          const blob = items[i].getAsFile();
          processFile(blob);
          return;
        }
      }
    });

    // Drag and drop
    pasteZone.addEventListener('dragover', function(e) {
      e.preventDefault();
      pasteZone.classList.add('drag-over');
    });
    pasteZone.addEventListener('dragleave', function() {
      pasteZone.classList.remove('drag-over');
    });
    pasteZone.addEventListener('drop', function(e) {
      e.preventDefault();
      pasteZone.classList.remove('drag-over');
      const files = e.dataTransfer.files;
      if (files.length > 0) processFile(files[0]);
    });

    // Click to open file dialog (bonus fallback)
    pasteZone.addEventListener('click', function() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = function(e) {
        if (e.target.files.length > 0) processFile(e.target.files[0]);
      };
      input.click();
    });

    // Focus paste zone so Ctrl+V works immediately
    pasteZone.focus();

    Streamlit.setFrameHeight(120);
  </script>
</body>
</html>
