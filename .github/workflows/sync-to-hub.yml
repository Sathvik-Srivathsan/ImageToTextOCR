name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: Sathvik-Srivathsan/ImageToTextOCR
          huggingface_repo_id: ${{ vars.HF_USERNAME }}/ImageToTextOCR
          hf_token: ${{ secrets.HF_TOKEN }}
